<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLY - Free-Lance Yachting</title>
    
    <!-- LUXURY FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet">
    
    <!-- ICONS (UPDATED TO 6.5.1 FOR TWITTER X) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- THREE.JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        /* --- CORE STYLES --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Playfair Display', serif;
            background: radial-gradient(circle at center, #0a2e24 0%, #020a08 70%);
            overflow: hidden;
            color: #FFD700;
            height: 100vh;
            width: 100vw;
        }

        /* --- HORIZONTAL SCAN LINES --- */
        .scan-lines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; pointer-events: none;
            background: linear-gradient(to bottom, rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%);
            background-size: 100% 4px;
        }

        /* --- GLOBE CONTAINER --- */
        #globe-container {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw; height: 100vh;
            z-index: 1;
            opacity: 0;
            animation: fadeInGlobe 3s ease forwards;
        }
        @keyframes fadeInGlobe { to { opacity: 1; } }

        /* --- MAIN CONTENT LAYER --- */
        .main-container {
            position: relative;
            z-index: 10;
            width: 100%; height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* THE CARD (Glassmorphism - Semi Transparent to show Globe) */
        .glass-card {
            text-align: center;
            padding: 40px 50px;
            border-radius: 30px;
            /* Dark but transparent to see globe behind */
            background: rgba(5, 15, 10, 0.35); 
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 50px rgba(0,0,0,0.6), inset 0 0 20px rgba(0,0,0,0.5);
            max-width: 900px;
            width: 90%;
            opacity: 0;
            transform: translateY(30px);
            animation: slideUp 1.5s ease forwards 0.5s;
        }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        /* --- PARTICLES --- */
        .particles {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; overflow: hidden; z-index: 11;
        }
        .particle {
            position: absolute;
            background: radial-gradient(circle, #FFD700, transparent);
            border-radius: 50%;
            opacity: 0;
            animation: floatUp 5s infinite ease-in-out;
        }
        @keyframes floatUp {
            0% { transform: translateY(20px) scale(0.5); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(-150px) scale(1.2); opacity: 0; }
        }

        /* --- TYPOGRAPHY & GOLD THEME --- */
        .logo {
            font-size: 10rem;
            font-weight: 900;
            letter-spacing: 15px;
            line-height: 1;
            margin-bottom: 0px;
            /* Gold Gradient Text */
            background: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            /* Glow Effect */
            filter: drop-shadow(0 0 15px rgba(245, 158, 11, 0.6));
            position: relative;
            z-index: 12;
        }

        .sub-title {
            font-size: 1.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: #F59E0B;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            z-index: 12;
            position: relative;
        }

        .tagline {
            font-size: 1.1rem;
            font-weight: 400;
            color: #E2C075;
            margin-bottom: 35px;
            font-style: italic;
            z-index: 12;
            position: relative;
        }

        /* --- CONTROLS SECTION --- */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            flex-wrap: wrap;
            z-index: 12;
            position: relative;
        }

        .social-group {
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.4);
            padding: 10px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 215, 0, 0.15);
        }
        
        .social-btn {
            width: 45px; height: 45px;
            background: transparent;
            border: 1px solid #F59E0B;
            border-radius: 10px;
            color: #FFD700;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 1.2rem;
        }
        .social-btn:hover {
            background: #FFD700;
            color: #000;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
        }

        .cta-btn {
            background: linear-gradient(135deg, #F59E0B, #FFD700);
            color: #05100a;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 12px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(245, 158, 11, 0.3);
            border: none;
            cursor: pointer;
        }
        .cta-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(245, 158, 11, 0.5);
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .logo { font-size: 6rem; letter-spacing: 8px; }
            .sub-title { font-size: 1.2rem; letter-spacing: 3px; }
            .controls { flex-direction: column; gap: 15px; }
            .glass-card { padding: 25px 15px; width: 95%; }
        }
    </style>
</head>
<body>

    <!-- BACKGROUND LAYERS -->
    <div class="scan-lines"></div>
    <div id="globe-container"></div>

    <!-- MAIN CONTENT -->
    <div class="main-container">
        <!-- PARTICLES CONTAINER -->
        <div class="particles" id="particles"></div>

        <!-- GLASS CARD -->
        <div class="glass-card">
            <!-- THE BIG TITLE -->
            <div class="logo">FLY</div>
            <div class="sub-title">FREE-LANCE YACHTING</div>
            <div class="tagline">The Daily Yachting Show • All Week • Find Freelance Yachting Opportunities</div>
            
            <!-- BUTTONS -->
            <div class="controls">
                <div class="social-group">
                    <span style="color: #FFD700; font-weight: bold; margin-right: 10px; font-size: 1.2rem; align-self: center;">FIND FLY</span>
                    <!-- X ICON FIXED -->
                    <a href="https://x.com/aber_aouni" target="_blank" class="social-btn"><i class="fa-brands fa-x-twitter"></i></a>
                    <a href="https://www.youtube.com/channel/UC7bmg-k_cOSzHi4OCST-ywQ" target="_blank" class="social-btn"><i class="fa-brands fa-youtube"></i></a>
                    <a href="https://www.tiktok.com/@headchefaber" target="_blank" class="social-btn"><i class="fa-brands fa-tiktok"></i></a>
                    <a href="#" class="social-btn"><i class="fa-solid fa-podcast"></i></a>
                    <a href="https://www.linkedin.com/groups/17620033/" target="_blank" class="social-btn"><i class="fa-brands fa-linkedin-in"></i></a>
                    <a href="https://www.instagram.com/freelanceyachting1" target="_blank" class="social-btn"><i class="fa-brands fa-instagram"></i></a>
                    <a href="https://www.facebook.com/share/g/1EmfadQ7jm/" target="_blank" class="social-btn"><i class="fa-brands fa-facebook-f"></i></a>
                </div>
                
                <a href="https://www.freelanceyachting.com/" target="_blank" class="cta-btn">LEARN MORE</a>
            </div>
        </div>
    </div>

    <script>
        // --- 1. PARTICLES GENERATOR ---
        function createParticles() {
            const container = document.getElementById('particles');
            const count = 40; // Number of particles
            for(let i=0; i<count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                // Random position
                p.style.left = Math.random() * 100 + '%';
                p.style.top = (50 + Math.random() * 50) + '%';
                // Random size
                const size = 3 + Math.random() * 5;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                // Random timing
                p.style.animationDelay = Math.random() * 5 + 's';
                p.style.animationDuration = (3 + Math.random() * 4) + 's';
                container.appendChild(p);
            }
        }
        createParticles();

        // --- 2. THREE.JS GLOBE SETUP ---
        window.addEventListener('load', () => {
            if(typeof THREE === 'undefined') return;

            const container = document.getElementById('globe-container');
            
            // Scene
            const scene = new THREE.Scene();
            // Fog for depth fading
            scene.fog = new THREE.FogExp2(0x050a08, 0.02);

            // Camera
            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 20; // Zoomed out to show full globe

            // Renderer
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setClearColor(0x000000, 0);
            container.appendChild(renderer.domElement);

            // --- GLOBE ---
            const radius = 7;
            const geometry = new THREE.SphereGeometry(radius, 64, 64);
            const loader = new THREE.TextureLoader();

            // Textures
            const mat = new THREE.MeshPhongMaterial({
                map: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg'),
                specularMap: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular_2048.jpg'),
                normalMap: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_normal_2048.jpg'),
                emissiveMap: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_lights_2048.png'),
                emissive: 0xF59E0B, // Gold lights
                emissiveIntensity: 0.8, // Brighter lights
                color: 0x1a4d3c, // Dark Greenish Earth
                specular: 0xFCD34D, // Gold specular
                shininess: 15
            });
            
            const globe = new THREE.Mesh(geometry, mat);
            scene.add(globe);

            // Clouds
            const cloudGeo = new THREE.SphereGeometry(radius * 1.02, 64, 64);
            const cloudMat = new THREE.MeshLambertMaterial({
                map: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_clouds_1024.png'),
                transparent: true,
                opacity: 0.3,
                blending: THREE.AdditiveBlending,
                side: THREE.DoubleSide
            });
            const clouds = new THREE.Mesh(cloudGeo, cloudMat);
            scene.add(clouds);

            // Atmosphere Glow (Shader)
            const atmosGeo = new THREE.SphereGeometry(radius * 1.15, 64, 64);
            const atmosMat = new THREE.ShaderMaterial({
                vertexShader: `
                    varying vec3 vNormal;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3 vNormal;
                    void main() {
                        float intensity = pow(0.6 - dot(vNormal, vec3(0, 0, 1.0)), 2.0);
                        gl_FragColor = vec4(0.96, 0.62, 0.04, 1.0) * intensity * 1.5; // Gold Atmosphere
                    }
                `,
                blending: THREE.AdditiveBlending,
                side: THREE.BackSide,
                transparent: true
            });
            scene.add(new THREE.Mesh(atmosGeo, atmosMat));

            // --- LIGHTING (CRUCIAL FOR VISIBILITY) ---
            // Stronger Ambient Light
            scene.add(new THREE.AmbientLight(0x404040, 1.5)); 
            
            // Main Sun Light (Warm/White)
            const sunLight = new THREE.DirectionalLight(0xffffff, 2.0);
            sunLight.position.set(20, 10, 15);
            scene.add(sunLight);

            // Rim Light (Gold) for edge definition
            const rimLight = new THREE.SpotLight(0xFFD700, 5.0);
            rimLight.position.set(-15, 10, -10);
            rimLight.lookAt(0,0,0);
            scene.add(rimLight);

            // Point Light (Front) to illuminate the face of the globe
            const frontLight = new THREE.PointLight(0xFFD700, 3.0, 50);
            frontLight.position.set(10, 5, 20);
            scene.add(frontLight);

            // --- ANIMATION ---
            function animate() {
                requestAnimationFrame(animate);
                
                // Rotation
                globe.rotation.y += 0.0015;
                clouds.rotation.y += 0.002;
                clouds.rotation.x += 0.0005;

                renderer.render(scene, camera);
            }
            animate();

            // Resize Handler
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        });
    </script>
</body>
</html>
